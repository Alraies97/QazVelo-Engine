kind = "web"
previewPath = "/"
title = "QazVelo Engine"
version = "1.0.0"
id = "artifacts/qazvelo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22331

[services.development]
run = "pnpm --filter @workspace/qazvelo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qazvelo", "run", "build" ]
publicDir = "artifacts/qazvelo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22331"
BASE_PATH = "/"
